<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人类历史大事件时间线</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>人类历史大事件时间线</h1>
        <p>从人类诞生到现代文明的辉煌历程</p>
        
        <!-- 国家选择器 -->
        <div class="country-selector">
            <label for="country-select">选择地区/国家：</label>
            <select id="country-select">
                <option value="global" selected>🌍 全球大事件</option>
                <option value="china">🇨🇳 中国</option>
                <option value="usa">🇺🇸 美国</option>
                <option value="japan">🇯🇵 日本</option>
                <option value="uk">🇬🇧 英国</option>
                <option value="france">🇫🇷 法国</option>
                <option value="germany">🇩🇪 德国</option>
                <option value="russia">🇷🇺 俄罗斯</option>
                <option value="india">🇮🇳 印度</option>
                <option value="brazil">🇧🇷 巴西</option>
                <option value="egypt">🇪🇬 埃及</option>
                <option value="greece">🇬🇷 希腊</option>
                <option value="rome">🏛️ 古罗马</option>
                <option value="islam">☪️ 伊斯兰文明</option>
            </select>
        </div>
    </header>

    <main class="timeline-container">
        <div class="timeline" id="timeline">
            <!-- 时间线内容将由JavaScript动态生成 -->
        </div>
    </main>

    <!-- 详情模态框 -->
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-body">
                <!-- 动态内容将插入这里 -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
